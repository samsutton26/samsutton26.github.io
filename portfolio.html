<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Sam Sutton</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-header {
      padding: calc(var(--nav-h) + 20px) 60px 28px;
      border-bottom: 1px solid #efefef;
    }
    .page-header h1 {
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 16px 60px 60px;
    }

    .project-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .project-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .project-card:hover img { transform: scale(1.03); }

    .proj-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .project-card:hover .proj-placeholder { background: #e4e4e4; }
    .proj-placeholder span {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
    }

    .project-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 40px 18px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .project-card:hover .project-info { opacity: 1; }
    .project-info h3 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }

    /* ── Project lightbox with internal carousel ── */
    .project-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .project-modal.open { display: flex; }

    .modal-close {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 24px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      z-index: 10;
      transition: color 0.2s;
    }
    .modal-close:hover { color: #fff; }

    .modal-title {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    /* Inner carousel */
    .modal-carousel {
      width: 100%;
      max-width: 1100px;
      padding: 0 80px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .modal-track-outer {
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    .modal-track-wrap {
      overflow: visible;
      padding: 0 12%;
    }

    .modal-track {
      display: flex;
      gap: 20px;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .modal-slide {
      flex: 0 0 100%;
      opacity: 0.3;
      transform: scale(0.93);
      transition: opacity 0.4s, transform 0.4s;
      cursor: pointer;
    }
    .modal-slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .modal-slide img {
      display: block;
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      background: #111;
    }

    .modal-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 28px;
      cursor: pointer;
      padding: 16px 8px;
      transition: color 0.2s;
      z-index: 5;
    }
    .modal-btn:hover { color: var(--gold); }
    .modal-btn.prev { left: 0; }
    .modal-btn.next { right: 0; }

    .modal-dots {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .modal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s;
    }
    .modal-dot.active { background: var(--gold); }

    .modal-counter {
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .page-header { padding: calc(var(--nav-h) + 20px) 24px 20px; }
      .project-grid { grid-template-columns: 1fr 1fr; padding: 12px 24px 40px; }
      .modal-carousel { padding: 0 48px; }
      .modal-track-wrap { padding: 0 8%; }
    }
    @media (max-width: 480px) {
      .project-grid { grid-template-columns: 1fr; }
      .modal-track-wrap { padding: 0 5%; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Sam Sutton</a>
    <ul class="nav-links">
      <li><a href="portfolio.html" class="active">Portfolio</a></li>
      <li><a href="about.html">About</a></li>

    </ul>
    <button class="hamburger" aria-label="Menu" onclick="toggleMenu()">

  </nav>

  <div class="mobile-menu" id="mobileMenu">

    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="contact.html" onclick="toggleMenu()">Contact</a>
  </div>

  <div class="page-content">
    <div class="page-header">

    <div class="project-grid">

      <!-- PROJECT 1: Portraiture -->

  <footer>

  <!-- ═══════════════════════════════════════════════
       PROJECT MODALS
       Each modal contains its own looping carousel.
       To add images: add more <img> tags inside the
       relevant .modal-track div.
       ═══════════════════════════════════════════════ -->

  <!-- PORTRAITURE MODAL -->
  <div class="project-modal" id="modal-portraiture">
    <button class="modal-close" onclick="closeProject('portraiture')">✕</button>
    <span class="modal-title">Portraiture</span>
    <div class="modal-carousel">
      <div class="modal-track-outer">
        <button class="modal-btn prev" onclick="modalMove('portraiture', -1)">&#8592;</button>
        <button class="modal-btn next" onclick="modalMove('portraiture', 1)">&#8594;</button>
        <div class="modal-track-wrap">
          <div class="modal-track" id="track-portraiture">
            <div class="modal-slide"><img src="Sam Sutton Portraiture 1.webp" alt="Portraiture 1"></div>
            <div class="modal-slide"><img src="Sam Sutton Portraiture 2.webp" alt="Portraiture 2"></div>
            <div class="modal-slide"><img src="Sam Sutton Portraiture 3.jpg"  alt="Portraiture 3"></div>
            <div class="modal-slide"><img src="Sam Sutton Portraiture 4.webp" alt="Portraiture 4"></div>
          </div>
        </div>
      </div>
      <div class="modal-dots" id="dots-portraiture"></div>
      <div class="modal-counter" id="counter-portraiture"></div>
    </div>
  </div>

  <!-- PROJECT 2 MODAL — add your images here when ready -->
  <div class="project-modal" id="modal-project2">
    <button class="modal-close" onclick="closeProject('project2')">✕</button>
    <span class="modal-title">Project Title</span>
    <div class="modal-carousel">
      <div class="modal-track-outer">
        <button class="modal-btn prev" onclick="modalMove('project2', -1)">&#8592;</button>
        <button class="modal-btn next" onclick="modalMove('project2', 1)">&#8594;</button>
        <div class="modal-track-wrap">
          <div class="modal-track" id="track-project2">
            <!-- Add images here: <div class="modal-slide"><img src="your-photo.jpg" alt="..."></div> -->
            <div class="modal-slide">
              <div style="width:100%;aspect-ratio:3/2;background:#222;display:flex;align-items:center;justify-content:center;">
                <span style="color:#555;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;">Add images</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-dots" id="dots-project2"></div>
      <div class="modal-counter" id="counter-project2"></div>
    </div>
  </div>

  <!-- PROJECT 3 MODAL — add your images here when ready -->
  <div class="project-modal" id="modal-project3">
    <button class="modal-close" onclick="closeProject('project3')">✕</button>
    <span class="modal-title">Project Title</span>
    <div class="modal-carousel">
      <div class="modal-track-outer">
        <button class="modal-btn prev" onclick="modalMove('project3', -1)">&#8592;</button>
        <button class="modal-btn next" onclick="modalMove('project3', 1)">&#8594;</button>
        <div class="modal-track-wrap">
          <div class="modal-track" id="track-project3">
            <!-- Add images here: <div class="modal-slide"><img src="your-photo.jpg" alt="..."></div> -->
            <div class="modal-slide">
              <div style="width:100%;aspect-ratio:3/2;background:#222;display:flex;align-items:center;justify-content:center;">
                <span style="color:#555;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;">Add images</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-dots" id="dots-project3"></div>
      <div class="modal-counter" id="counter-project3"></div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.querySelector('.hamburger').classList.toggle('open');
    }

    // ── Per-project carousel state ──
    const state = {};

    function initCarousel(id) {
      if (state[id]) return; // already initialised
      const track = document.getElementById('track-' + id);
      const origSlides = Array.from(track.children);
      const total = origSlides.length;
      if (total === 0) return;

      // Clone first and last for infinite loop
      const cloneFirst = origSlides[0].cloneNode(true);
      const cloneLast  = origSlides[total - 1].cloneNode(true);
      track.appendChild(cloneFirst);
      track.insertBefore(cloneLast, track.firstChild);

      state[id] = { current: 1, total, isTransitioning: false };
      setModalPosition(id, 1, false);
      updateModalActive(id);
      buildModalDots(id);
    }

    function slideWidth(id) {
      const track = document.getElementById('track-' + id);
      return track.children[1].offsetWidth + 20;
    }

    function setModalPosition(id, index, animate) {
      const track = document.getElementById('track-' + id);
      track.style.transition = animate
        ? 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        : 'none';
      track.style.transform = `translateX(-${index * slideWidth(id)}px)`;
    }

    function updateModalActive(id) {
      const track = document.getElementById('track-' + id);
      const slides = Array.from(track.children);
      const cur = state[id].current;
      slides.forEach((s, i) => s.classList.toggle('active', i === cur));
    }

    function buildModalDots(id) {
      const dotsEl = document.getElementById('dots-' + id);
      const counterEl = document.getElementById('counter-' + id);
      const { current, total } = state[id];
      const realIndex = current - 1;
      dotsEl.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const btn = document.createElement('button');
        btn.className = 'modal-dot' + (i === realIndex ? ' active' : '');
        btn.onclick = () => modalGoTo(id, i + 1);
        dotsEl.appendChild(btn);
      }
      counterEl.textContent = `${realIndex + 1} / ${total}`;
    }

    function modalGoTo(id, index, animate = true) {
      if (!state[id] || state[id].isTransitioning) return;
      state[id].isTransitioning = true;
      state[id].current = index;
      setModalPosition(id, index, animate);
      updateModalActive(id);
      buildModalDots(id);

      const track = document.getElementById('track-' + id);
      track.addEventListener('transitionend', function handler() {
        track.removeEventListener('transitionend', handler);
        state[id].isTransitioning = false;
        const { total } = state[id];
        if (state[id].current === 0) {
          state[id].current = total;
          setModalPosition(id, total, false);
        } else if (state[id].current === total + 1) {
          state[id].current = 1;
          setModalPosition(id, 1, false);
        }
        updateModalActive(id);
        buildModalDots(id);
      });
    }

    function modalMove(id, dir) {
      if (!state[id]) return;
      modalGoTo(id, state[id].current + dir);
    }

    function openProject(id) {
      initCarousel(id);
      document.getElementById('modal-' + id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeProject(id) {
      document.getElementById('modal-' + id).classList.remove('open');
      document.body.style.overflow = '';
    }

    // Close on backdrop click
    document.querySelectorAll('.project-modal').forEach(modal => {
      modal.addEventListener('click', e => {
        if (e.target === modal) closeProject(modal.id.replace('modal-', ''));
      });
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      const open = document.querySelector('.project-modal.open');
      if (!open) return;
      const id = open.id.replace('modal-', '');
      if (e.key === 'Escape')      closeProject(id);
      if (e.key === 'ArrowRight')  modalMove(id, 1);
      if (e.key === 'ArrowLeft')   modalMove(id, -1);
    });

    // Scroll to project if arriving via anchor link from index page
    window.addEventListener('load', () => {
      if (window.location.hash) {
        const el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  </script>

</body>
</html>
