<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam Sutton</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .hero {
      height: auto;
      padding: 28px 24px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(32px, 6vw, 64px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .carousel-section { padding: 20px 0 40px; }

    .carousel-outer {
      position: relative;
      overflow: hidden;
    }

    .carousel-track-wrap {
      overflow: visible;
      padding: 0 15%;
    }

    .carousel-track {
      display: flex;
      gap: 24px;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .carousel-slide {
      flex: 0 0 100%;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: opacity 0.4s, transform 0.4s;
      opacity: 0.4;
      transform: scale(0.95);
    }
    .carousel-slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .carousel-slide img {
      display: block;
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      pointer-events: none;
    }

    .carousel-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-placeholder span {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }

    .carousel-label {
      margin-top: 14px;
      text-align: center;
    }
    .carousel-label h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .carousel-btn {
      position: absolute;
      top: calc(50% - 30px);
      transform: translateY(-50%);
      background: none;
      border: none;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      color: var(--text-dim);
      transition: color 0.2s;
      z-index: 10;
    }
    .carousel-btn:hover { color: var(--gold); }
    .carousel-btn.prev { left: 6%; }
    .carousel-btn.next { right: 6%; }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      padding: 0;
    }
    .dot.active { background: var(--gold); }

    .view-all-wrap {
      text-align: center;
      margin-top: 32px;
    }
    .view-all {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
    }
    .view-all:hover { color: var(--gold); border-color: var(--gold); }

    @media (max-width: 768px) {
      .carousel-section { padding: 20px 0 32px; }
      .carousel-track-wrap { padding: 0 10%; }
      .carousel-btn.prev { left: 2%; }
      .carousel-btn.next { right: 2%; }
    }
    @media (max-width: 480px) {
      .carousel-track-wrap { padding: 0 8%; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Sam Sutton</a>
    <ul class="nav-links">
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="hamburger" aria-label="Menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="portfolio.html" onclick="toggleMenu()">Portfolio</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="contact.html" onclick="toggleMenu()">Contact</a>
  </div>

  <div class="page-content">
    <div class="hero">
      <h1>Sam Sutton</h1>
    </div>

    <div class="carousel-section">
      <div class="carousel-outer">
        <button class="carousel-btn prev" onclick="manualMove(-1)">&#8592;</button>
        <button class="carousel-btn next" onclick="manualMove(1)">&#8594;</button>

        <div class="carousel-track-wrap">
          <div class="carousel-track" id="carouselTrack">

            <div class="carousel-slide" data-link="portfolio.html#project-1">
              <img src="Sam Sutton Portraiture 1.webp" alt="Portraiture">
              <div class="carousel-label"><h3>Portraiture</h3></div>
            </div>

            <div class="carousel-slide" data-link="portfolio.html#project-2">
              <img src="Sam Sutton British Columbia 1.jpg" alt="British Columbia">
              <div class="carousel-label"><h3>British Columbia</h3></div>
            </div>

            <div class="carousel-slide" data-link="portfolio.html#project-3">
              <img src="Sam_Sutton-18.jpg" alt="Kalymnos">
              <div class="carousel-label"><h3>Kalymnos</h3></div>
            </div>

          </div>
        </div>
      </div>

      <div class="carousel-dots" id="carouselDots"></div>

      <div class="view-all-wrap">
        <a href="portfolio.html" class="view-all">View all projects</a>
      </div>
    </div>
  </div>

  <footer>
    <p>Sam Sutton &nbsp;·&nbsp; &copy; 2026</p>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.querySelector('.hamburger').classList.toggle('open');
    }

    // ── Infinite looping carousel with 3s autoplay ──
    const track = document.getElementById('carouselTrack');
    const dotsWrap = document.getElementById('carouselDots');

    const originalSlides = Array.from(track.children);
    const total = originalSlides.length;

    // Clone last before first, first after last
    const cloneFirst = originalSlides[0].cloneNode(true);
    const cloneLast  = originalSlides[total - 1].cloneNode(true);
    track.appendChild(cloneFirst);
    track.insertBefore(cloneLast, track.firstChild);

    const allSlides = Array.from(track.children);
    let current = 1;
    let isTransitioning = false;
    let autoTimer = null;

    function slideWidth() {
      return allSlides[1].offsetWidth + 24;
    }

    function setPosition(index, animate) {
      track.style.transition = animate
        ? 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        : 'none';
      track.style.transform = `translateX(-${index * slideWidth()}px)`;
    }

    function updateActive() {
      allSlides.forEach((s, i) => s.classList.toggle('active', i === current));
    }

    function buildDots() {
      dotsWrap.innerHTML = '';
      const realIndex = current - 1;
      for (let i = 0; i < total; i++) {
        const btn = document.createElement('button');
        btn.className = 'dot' + (i === realIndex ? ' active' : '');
        btn.onclick = () => { resetAutoplay(); goTo(i + 1); };
        dotsWrap.appendChild(btn);
      }
    }

    function goTo(index, animate = true) {
      if (isTransitioning) return;
      isTransitioning = true;
      current = index;
      setPosition(current, animate);
      updateActive();
      buildDots();
    }

    track.addEventListener('transitionend', () => {
      isTransitioning = false;
      if (current === 0) {
        current = total;
        setPosition(current, false);
      } else if (current === total + 1) {
        current = 1;
        setPosition(current, false);
      }
      updateActive();
      buildDots();
    });

    // Autoplay — advances every 3 seconds
    function startAutoplay() {
      autoTimer = setInterval(() => {
        goTo(current + 1);
      }, 3000);
    }

    function resetAutoplay() {
      clearInterval(autoTimer);
      startAutoplay();
    }

    function manualMove(dir) {
      resetAutoplay();
      goTo(current + dir);
    }

    // Click: inactive slide = navigate to it; active slide = follow link
    allSlides.forEach((slide, i) => {
      slide.addEventListener('click', () => {
        if (i !== current) {
          resetAutoplay();
          goTo(i);
        } else {
          const realIndex = ((current - 1) + total) % total;
          const link = originalSlides[realIndex].dataset.link;
          if (link) location.href = link;
        }
      });
    });

    window.addEventListener('resize', () => setPosition(current, false));

    // Init
    setPosition(current, false);
    updateActive();
    buildDots();
    startAutoplay();
  </script>

</body>
</html>
